# Demo experiment: EMA cross on deterministic synthetic FX bars.
# Run with: make backtest-smoke
name: ema_cross_demo

strategy:
  key: ema_cross
  instrument_id: EUR/USD.SIM
  bar_type: EUR/USD.SIM-1-MINUTE-MID-EXTERNAL
  params:
    fast_period: 10
    slow_period: 30
    trade_size: 100000

data:
  source: synthetic
  start: "2024-01-01T00:00:00Z"
  num_bars: 2000
  seed: 42
  bar_interval_secs: 60

venue:
  name: SIM
  starting_balance: 1_000_000 USD
  account_type: MARGIN

risk:
  max_notional_per_order: 200000
  max_open_positions: 1
  max_drawdown_pct: 0.5
