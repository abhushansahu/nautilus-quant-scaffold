# Multi-strategy backtest — two Deribit reference strategies + SelectorActor TopN

trader_id: BACKTEST-BTC-MULTI-001

venue:
  name: DERIBIT
  adapter: DERIBIT
  base_currency: USD
  account_type: MARGIN

diversification:
  enabled: true
  top_n: 1
  max_per_instrument: 1
  max_per_strategy: 0.5
  batch_interval_ms: 50

approval:
  human_edge_bps_threshold: -5000.0

strategies:
  - strategy_id: reference-wide
    strategy_class: reference
    underlying: BTC-PERPETUAL.DERIBIT
    reference:
      structure_selector: deribit
      option_series_id: BTC
      option_series_expiry: "2026-05-19"
      settlement_currency: BTC
      strike_width: 5000
      order_qty: 0.1
      hedge_perp_instrument: BTC-PERPETUAL.DERIBIT
      hedge_delta_band: 0.30
  - strategy_id: reference-narrow
    strategy_class: reference
    underlying: BTC-PERPETUAL.DERIBIT
    reference:
      structure_selector: deribit
      option_series_id: BTC
      option_series_expiry: "2026-05-19"
      settlement_currency: BTC
      strike_width: 3000
      order_qty: 0.1
      hedge_perp_instrument: BTC-PERPETUAL.DERIBIT
      hedge_delta_band: 0.30

subscriptions:
  chain_snapshot_interval_ms: 1000

session:
  expiry_mode: daily_utc
  blackout_minutes_before_close: 30
  market_close_utc: "08:00"

operational:
  require_chain_snapshot: true
  max_chain_snapshot_age_secs: 120

gates:
  min_edge_after_cost_bps: -5000.0
  min_liquidity_score: 0.0

regime:
  blocked_regimes: []

journal:
  path: runs/latest.jsonl

dry_run: false
