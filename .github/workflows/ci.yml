name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: "3.14"

      - name: Sync dependencies
        run: uv sync --group dev

      - name: Smoke import
        run: uv run python -c "import nautilus_trader; import nautilus_zerodte; print('ok')"

      - name: Lint
        run: uv run ruff check src tests

      - name: Unit tests
        run: uv run pytest tests/unit/

      - name: Backtest integration smoke
        run: uv run pytest tests/integration/test_backtest_smoke.py -v
